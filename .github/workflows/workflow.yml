name: CICD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  # Pin for reproducible installs; bump intentionally when upgrading Argo CD.
  ARGOCD_VERSION: v2.14.3
  # Prefer repo variable ACK_CLUSTER_ID; falls back to legacy default if unset.
  ACK_CLUSTER_ID: ${{ vars.ACK_CLUSTER_ID || 'c6158028f3dfc4d6c8e00daf7a9c4f3e6' }}

defaults:
  run:
    shell: bash

jobs:
  deploy_argocd:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Alibaba Cloud credentials (OIDC)
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ secrets.ROLETOASSUME }}
          oidc-provider-arn: ${{ secrets.OIDC_PROVIDER }}
          audience: ${{ secrets.AUDIENCE }}

      - name: Set K8s context
        uses: aliyun/ack-set-context@v1
        with:
          access-key-id: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          security-token: ${{ env.ALIBABA_CLOUD_SECURITY_TOKEN }}
          cluster-id: ${{ env.ACK_CLUSTER_ID }}

      - name: Ensure ArgoCD Namespace
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -

      - name: Install or Upgrade ArgoCD
        run: |
          kubectl apply --server-side -n argocd -f "https://raw.githubusercontent.com/argoproj/argo-cd/${ARGOCD_VERSION}/manifests/install.yaml"

      - name: Wait for ArgoCD
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment/argocd-server -n argocd

      - name: Display ArgoCD Connection Info
        run: |
          echo "### ArgoCD Port-Forward Command ###"
          echo "Run the following in your terminal to access the UI:"
          echo "kubectl port-forward svc/argocd-server -n argocd 8080:443"
          echo "Then visit: https://localhost:8080"
          echo "kubectl -n argocd get secret argocd-initial-admin-secret -o jsonpath=\"{.data.password}\" | base64 -d; echo"

  deploy_staging:
    runs-on: ubuntu-latest
    needs: deploy_argocd
    environment: staging
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Alibaba Cloud credentials (OIDC)
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ secrets.ROLETOASSUME }}
          oidc-provider-arn: ${{ secrets.OIDC_PROVIDER }}
          audience: ${{ secrets.AUDIENCE }}

      - name: Set K8s context
        uses: aliyun/ack-set-context@v1
        with:
          access-key-id: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          security-token: ${{ env.ALIBABA_CLOUD_SECURITY_TOKEN }}
          cluster-id: ${{ env.ACK_CLUSTER_ID }}

      - name: Apply ArgoCD Apps
        run: |
          kubectl apply -f bootstrap/root-staging.yaml

  deploy_production:
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Alibaba Cloud credentials (OIDC)
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ secrets.ROLETOASSUME }}
          oidc-provider-arn: ${{ secrets.OIDC_PROVIDER }}
          audience: ${{ secrets.AUDIENCE }}

      - name: Set K8s context
        uses: aliyun/ack-set-context@v1
        with:
          access-key-id: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          security-token: ${{ env.ALIBABA_CLOUD_SECURITY_TOKEN }}
          cluster-id: ${{ env.ACK_CLUSTER_ID }}

      - name: Apply ArgoCD Apps
        run: |
          kubectl apply -f bootstrap/root-production.yaml

  cleanup:
    runs-on: ubuntu-latest
    needs: deploy_argocd
    environment: cleanup
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure Alibaba Cloud credentials (OIDC)
        uses: aliyun/configure-aliyun-credentials-action@v1
        with:
          role-to-assume: ${{ secrets.ROLETOASSUME }}
          oidc-provider-arn: ${{ secrets.OIDC_PROVIDER }}
          audience: ${{ secrets.AUDIENCE }}

      - name: Set K8s context
        uses: aliyun/ack-set-context@v1
        with:
          access-key-id: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_ID }}
          access-key-secret: ${{ env.ALIBABA_CLOUD_ACCESS_KEY_SECRET }}
          security-token: ${{ env.ALIBABA_CLOUD_SECURITY_TOKEN }}
          cluster-id: ${{ env.ACK_CLUSTER_ID }}
      - name: Cleanup ArgoCD Apps
        run: |
          kubectl delete -f bootstrap/root-staging.yaml
          kubectl delete -f bootstrap/root-production.yaml

      - name: Cleanup ArgoCD
        run: |
          kubectl delete -n argocd -f "https://raw.githubusercontent.com/argoproj/argo-cd/${ARGOCD_VERSION}/manifests/install.yaml"

      - name: Delete ArgoCD Namespace
        run: |
          kubectl delete namespace argocd
